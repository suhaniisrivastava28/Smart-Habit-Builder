<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Habit Builder</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    width:90%;
    max-width:700px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input{
    width:75%;
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0284c7;
}

ul{
    list-style:none;
    margin-top:15px;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:#334155;
    margin-bottom:10px;
    border-radius:8px;
}

.progress-container{
    width:100%;
    height:20px;
    background:#334155;
    border-radius:10px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#22c55e;
}

.stats{
    margin-top:15px;
}

.streak{
    color:#facc15;
}

</style>
</head>
<body>

<div class="container">

<h1>🔥 Smart Habit Builder</h1>

<div class="card">

<input type="text" id="habitInput"
placeholder="Enter a habit">

<button onclick="addHabit()">Add</button>

<ul id="habitList"></ul>

</div>

<div class="card">

<h2>Progress</h2>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="stats">
<p>Completed: <span id="completed">0</span></p>
<p>Total Habits: <span id="total">0</span></p>
<p class="streak">🔥 Streak: <span id="streak">0</span></p>
</div>

</div>

</div>

<script>

let habits = JSON.parse(localStorage.getItem("habits")) || [];

function saveData(){
    localStorage.setItem("habits", JSON.stringify(habits));
}

function addHabit(){

    let input = document.getElementById("habitInput");

    if(input.value.trim() === "") return;

    habits.push({
        name: input.value,
        completed:false
    });

    input.value = "";

    saveData();
    renderHabits();
}

function toggleHabit(index){

    habits[index].completed =
    !habits[index].completed;

    saveData();
    renderHabits();
}

function renderHabits(){

    let list =
    document.getElementById("habitList");

    list.innerHTML = "";

    habits.forEach((habit,index)=>{

        let li = document.createElement("li");

        li.innerHTML = `
        <span>
        <input type="checkbox"
        ${habit.completed ? "checked" : ""}
        onchange="toggleHabit(${index})">
        ${habit.name}
        </span>
        `;

        list.appendChild(li);
    });

    updateStats();
}

function updateStats(){

    let total = habits.length;

    let completed =
    habits.filter(h=>h.completed).length;

    document.getElementById("completed")
    .innerText = completed;

    document.getElementById("total")
    .innerText = total;

    let progress =
    total ? (completed/total)*100 : 0;

    document.getElementById("progressBar")
    .style.width = progress + "%";

    document.getElementById("streak")
    .innerText = completed;
}

renderHabits();

</script>

</body>
</html>
